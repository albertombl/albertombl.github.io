    <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RA 01 - Primera escena con marcador</title>

  <!-- Versiones compatibles -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 16px;
    }

    .pagina {
      max-width: 900px;
      margin: 0 auto;
    }

    .info {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    /* Caja visible y controlada para trabajar */
    #ar-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 420px;
      margin: 0 auto 24px auto;
      border: 2px solid #444;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    /* La escena ocupa la caja */
    #ar-container a-scene {
      position: absolute !important;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* Forzar vídeo y canvas a quedarse dentro de la caja */
    #ar-container video,
    #ar-container canvas,
    #ar-container .a-canvas {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    /* Evitar botones o elementos sobrantes */
    #ar-container .a-enter-vr,
    #ar-container .a-orientation-modal,
    #ar-container .a-fullscreen-ui {
      display: none !important;
    }

    .evidencias {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
    }

    .evidencias img {
      max-width: 300px;
      width: 100%;
      display: block;
      margin-bottom: 15px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>
  <div class="pagina">

    <div class="info">
      <strong>Tarea 1_. Primera escena de RA con marcador</strong><br>
      Enfoca el marcador Hiro para ver aparecer la figura 3D dentro de la caja de trabajo.
    </div>

    <div id="ar-container">
      <a-scene
        embedded
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true;"
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

        <a-marker preset="hiro">
          <a-box
            position="0 0.5 0"
            rotation="0 45 0"
            scale="0.5 0.5 0.5"
            color="red">
          </a-box>
        </a-marker>

        <a-entity camera></a-entity>
      </a-scene>
    </div>

    <section class="evidencias">
      <h2>Evidencias de la tarea</h2>
      <p>Aquí debes insertar una o dos fotos hechas con otro móvil, donde se vea esta experiencia funcionando.</p>

      <img src="imagenes/evidencia1.jpg" alt="Evidencia 1">
      <img src="imagenes/evidencia2.jpg" alt="Evidencia 2">
    </section>

  </div>
</body>
</html>
