<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RA 01 - Primera escena con marcador</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .pagina {
      max-width: 900px;
      margin: 0 auto;
    }

    .caja-ra {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 420px;
      margin: 0 auto 24px auto;
      border: 2px solid #444;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .caja-ra a-scene {
      position: absolute !important;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* Canvas principal de A-Frame */
    .a-canvas {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 2 !important;
    }

    /* Vídeo de la cámara que inyecta AR.js */
    #arjs-video {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: 1 !important;
    }

    /* Canvas auxiliar de AR.js */
    canvas {
      max-width: 100%;
    }

    .evidencias {
      position: relative;
      z-index: 10;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
    }

    .evidencias img {
      max-width: 300px;
      width: 100%;
      display: block;
      margin-bottom: 15px;
      border: 1px solid #ccc;
    }

    .a-enter-vr,
    .a-orientation-modal,
    .a-fullscreen-ui {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="pagina">

    <div class="caja-ra" id="contenedor-ra">
      <a-scene
        embedded
        vr-mode-ui="enabled: false"
        renderer="alpha: true; antialias: true;"
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

        <a-marker preset="hiro">
          <a-box
            position="0 0.5 0"
            rotation="0 45 0"
            scale="0.5 0.5 0.5"
            color="red">
          </a-box>
        </a-marker>

        <a-entity camera></a-entity>
      </a-scene>
    </div>

    <section class="evidencias">
      <h2>Evidencias de la tarea</h2>
      <p>Aquí debes insertar una o dos fotos hechas con otro móvil, donde se vea esta experiencia funcionando.</p>

      <img src="imagenes/evidencia1.jpg" alt="Evidencia 1">
      <img src="imagenes/evidencia2.jpg" alt="Evidencia 2">
    </section>

  </div>

  <script>
    window.addEventListener("load", () => {
      const contenedor = document.getElementById("contenedor-ra");

      const recolocarElementosAR = () => {
        const video = document.getElementById("arjs-video");
        const canvas = document.querySelector(".a-canvas");

        if (video && video.parentElement !== contenedor) {
          contenedor.appendChild(video);
        }

        if (canvas && canvas.parentElement !== contenedor) {
          contenedor.appendChild(canvas);
        }
      };

      setTimeout(recolocarElementosAR, 1000);
      setTimeout(recolocarElementosAR, 2000);
      setTimeout(recolocarElementosAR, 3000);
    });
  </script>
</body>
</html>
